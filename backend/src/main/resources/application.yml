spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aiqb.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:aiqb-secret-key-please-change-this-in-production-2026}
  expire-minutes: ${JWT_EXPIRE_MINUTES:1440}
  header: Authorization
  prefix: "Bearer "

# 通义千问 AI
ai:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:replace-with-your-key}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model: qwen-plus

# 文件上传
file:
  upload-dir: ./uploads/

logging:
  level:
    com.aiqb: debug
    com.aiqb.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
